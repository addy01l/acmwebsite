version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: acm_postgres
    restart: always
    environment:
      POSTGRES_USER: acm_admin
      POSTGRES_PASSWORD: acm_secure_password123
      POSTGRES_DB: acm_shivalik
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
